<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BasedCollectiveFans – Creator collectibles &amp; fan exchange</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0b0f;
      --bg2: #131118;
      --surface: #1a1720;
      --surface2: #221e28;
      --border: #2d2835;
      --text: #f0eef4;
      --textMuted: #9a92a8;
      --accent: #c77dff;
      --accentDim: #9d4edd;
      --accentHover: #e0aaff;
      --green: #80ffdb;
      --amber: #ffd166;
      --rose: #f72585;
      --radius: 12px;
      --radiusSm: 8px;
      --font: 'Outfit', system-ui, sans-serif;
      --fontMono: 'Space Mono', monospace;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--accentHover); }
    code, .mono { font-family: var(--fontMono); font-size: 0.88em; }

    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .site-header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .site-header h1 span { color: var(--accent); }
    .site-header nav {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .site-header nav a,
    .site-header nav button {
      padding: 0.5rem 1rem;
      border-radius: var(--radiusSm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      transition: background 0.2s, border-color 0.2s;
    }
    .site-header nav a:hover,
    .site-header nav button:hover {
      background: var(--border);
      border-color: var(--accentDim);
    }
    .site-header .api-url {
      font-family: var(--fontMono);
      font-size: 0.8rem;
      color: var(--textMuted);
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    .hero {
      text-align: center;
      padding: 3rem 2rem;
      background: linear-gradient(180deg, var(--surface) 0%, transparent 100%);
      border-radius: var(--radius);
      margin-bottom: 2rem;
    }
    .hero h2 {
      font-size: 1.75rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .hero p {
      color: var(--textMuted);
      font-size: 1rem;
      max-width: 520px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--text); }
    .card h3 { font-size: 0.95rem; margin: 1rem 0 0.5rem; color: var(--textMuted); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radiusSm);
      padding: 1rem;
      text-align: center;
    }
    .stat-box .value { font-size: 1.5rem; font-weight: 600; color: var(--accent); }
    .stat-box .label { font-size: 0.8rem; color: var(--textMuted); margin-top: 0.25rem; }

    .creator-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }
    .creator-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      transition: border-color 0.2s, transform 0.2s;
    }
    .creator-card:hover {
      border-color: var(--accentDim);
      transform: translateY(-2px);
    }
    .creator-card .handle { font-weight: 600; font-size: 1.05rem; color: var(--accent); }
    .creator-card .account { font-family: var(--fontMono); font-size: 0.75rem; color: var(--textMuted); margin-top: 0.35rem; word-break: break-all; }
    .creator-card .meta { font-size: 0.85rem; color: var(--textMuted); margin-top: 0.75rem; }
    .creator-card .follow-btn {
      margin-top: 0.75rem;
      padding: 0.4rem 0.8rem;
      border-radius: var(--radiusSm);
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .creator-card .follow-btn:hover { background: var(--accentDim); color: var(--bg); }

    .collectible-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem;
    }
    .collectible-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      transition: border-color 0.2s;
    }
    .collectible-card:hover { border-color: var(--accentDim); }
    .collectible-card .col-id { font-family: var(--fontMono); font-size: 0.8rem; color: var(--textMuted); }
    .collectible-card .supply { font-size: 0.9rem; margin-top: 0.5rem; color: var(--green); }
    .collectible-card .creator-link { font-size: 0.85rem; margin-top: 0.5rem; }

    .listings-table,
    .offers-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .listings-table th,
    .listings-table td,
    .offers-table th,
    .offers-table td {
      padding: 0.6rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .listings-table th,
    .offers-table th {
      color: var(--textMuted);
      font-weight: 500;
    }
    .listings-table tr:hover,
    .offers-table tr:hover { background: var(--surface2); }
    .addr { font-family: var(--fontMono); font-size: 0.8rem; word-break: break-all; }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .tabs button {
      padding: 0.6rem 1rem;
      border: none;
      background: none;
      color: var(--textMuted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
