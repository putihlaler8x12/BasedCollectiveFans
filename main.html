<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BasedCollectiveFans – Creator collectibles &amp; fan exchange</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0b0f;
      --bg2: #131118;
      --surface: #1a1720;
      --surface2: #221e28;
      --border: #2d2835;
      --text: #f0eef4;
      --textMuted: #9a92a8;
      --accent: #c77dff;
      --accentDim: #9d4edd;
      --accentHover: #e0aaff;
      --green: #80ffdb;
      --amber: #ffd166;
      --rose: #f72585;
      --radius: 12px;
      --radiusSm: 8px;
      --font: 'Outfit', system-ui, sans-serif;
      --fontMono: 'Space Mono', monospace;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--accentHover); }
    code, .mono { font-family: var(--fontMono); font-size: 0.88em; }

    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .site-header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .site-header h1 span { color: var(--accent); }
    .site-header nav {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .site-header nav a,
    .site-header nav button {
      padding: 0.5rem 1rem;
      border-radius: var(--radiusSm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      transition: background 0.2s, border-color 0.2s;
    }
    .site-header nav a:hover,
    .site-header nav button:hover {
      background: var(--border);
      border-color: var(--accentDim);
    }
    .site-header .api-url {
      font-family: var(--fontMono);
      font-size: 0.8rem;
      color: var(--textMuted);
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    .hero {
      text-align: center;
      padding: 3rem 2rem;
      background: linear-gradient(180deg, var(--surface) 0%, transparent 100%);
      border-radius: var(--radius);
      margin-bottom: 2rem;
    }
    .hero h2 {
      font-size: 1.75rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .hero p {
      color: var(--textMuted);
      font-size: 1rem;
      max-width: 520px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--text); }
    .card h3 { font-size: 0.95rem; margin: 1rem 0 0.5rem; color: var(--textMuted); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radiusSm);
      padding: 1rem;
      text-align: center;
    }
    .stat-box .value { font-size: 1.5rem; font-weight: 600; color: var(--accent); }
    .stat-box .label { font-size: 0.8rem; color: var(--textMuted); margin-top: 0.25rem; }

    .creator-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }
    .creator-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      transition: border-color 0.2s, transform 0.2s;
    }
    .creator-card:hover {
      border-color: var(--accentDim);
      transform: translateY(-2px);
    }
    .creator-card .handle { font-weight: 600; font-size: 1.05rem; color: var(--accent); }
    .creator-card .account { font-family: var(--fontMono); font-size: 0.75rem; color: var(--textMuted); margin-top: 0.35rem; word-break: break-all; }
    .creator-card .meta { font-size: 0.85rem; color: var(--textMuted); margin-top: 0.75rem; }
    .creator-card .follow-btn {
      margin-top: 0.75rem;
      padding: 0.4rem 0.8rem;
      border-radius: var(--radiusSm);
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .creator-card .follow-btn:hover { background: var(--accentDim); color: var(--bg); }

    .collectible-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem;
    }
    .collectible-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      transition: border-color 0.2s;
    }
    .collectible-card:hover { border-color: var(--accentDim); }
    .collectible-card .col-id { font-family: var(--fontMono); font-size: 0.8rem; color: var(--textMuted); }
    .collectible-card .supply { font-size: 0.9rem; margin-top: 0.5rem; color: var(--green); }
    .collectible-card .creator-link { font-size: 0.85rem; margin-top: 0.5rem; }

    .listings-table,
    .offers-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .listings-table th,
    .listings-table td,
    .offers-table th,
    .offers-table td {
      padding: 0.6rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .listings-table th,
    .offers-table th {
      color: var(--textMuted);
      font-weight: 500;
    }
    .listings-table tr:hover,
    .offers-table tr:hover { background: var(--surface2); }
    .addr { font-family: var(--fontMono); font-size: 0.8rem; word-break: break-all; }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .tabs button {
      padding: 0.6rem 1rem;
      border: none;
      background: none;
      color: var(--textMuted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tabs button:hover { color: var(--text); }
    .tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }

    .panel { display: none; }
    .panel.active { display: block; }

    .form-row {
      margin-bottom: 1rem;
    }
    .form-row label {
      display: block;
      font-size: 0.85rem;
      color: var(--textMuted);
      margin-bottom: 0.35rem;
    }
    .form-row input {
      width: 100%;
      max-width: 360px;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radiusSm);
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
    }
    .form-row input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn {
      padding: 0.6rem 1.2rem;
      border-radius: var(--radiusSm);
      border: none;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    .message {
      padding: 0.75rem 1rem;
      border-radius: var(--radiusSm);
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .message.error { background: rgba(247, 37, 133, 0.15); border: 1px solid var(--rose); color: var(--rose); }
    .message.success { background: rgba(128, 255, 219, 0.1); border: 1px solid var(--green); color: var(--green); }
    .message.info { background: rgba(157, 78, 221, 0.15); border: 1px solid var(--accentDim); color: var(--accentHover); }

    .loading { color: var(--textMuted); font-size: 0.9rem; }
    .empty { color: var(--textMuted); font-size: 0.95rem; padding: 2rem; text-align: center; }

    footer {
      margin-top: 3rem;
      padding: 2rem;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--textMuted);
      font-size: 0.85rem;
    }

    @media (max-width: 768px) {
      .site-header { padding: 1rem; flex-direction: column; align-items: flex-start; }
      .site-header nav { width: 100%; }
      .container { padding: 1rem; }
      .hero { padding: 2rem 1rem; }
      .hero h2 { font-size: 1.4rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .creator-grid { grid-template-columns: 1fr; }
      .collectible-grid { grid-template-columns: 1fr; }
      .listings-table, .offers-table { font-size: 0.8rem; }
      .listings-table th, .listings-table td, .offers-table th, .offers-table td { padding: 0.4rem; }
    }

    .detail-view {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-top: 1rem;
    }
    .detail-view h3 { margin-bottom: 0.75rem; color: var(--accent); }
    .detail-view .field { margin-bottom: 0.5rem; font-size: 0.9rem; }
    .detail-view .field .label { color: var(--textMuted); margin-right: 0.5rem; }
    .pagination { display: flex; gap: 0.5rem; align-items: center; margin-top: 1rem; flex-wrap: wrap; }
    .pagination button {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      border-radius: var(--radiusSm);
      cursor: pointer;
      font-family: inherit;
    }
    .pagination button:hover { border-color: var(--accent); }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
    .pagination span { color: var(--textMuted); font-size: 0.9rem; }
    .filter-bar { margin-bottom: 1rem; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
    .filter-bar input, .filter-bar select {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radiusSm);
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
